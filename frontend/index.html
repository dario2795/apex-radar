<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex-Radar — Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 font-mono min-h-screen antialiased selection:bg-red-500 selection:text-white">

    <header class="bg-slate-900 border-b-2 border-red-600 px-4 py-3 shadow-xl">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 text-slate-950 font-black p-2 rounded-md shadow-lg shadow-red-900/30">
                    <i class="fa-solid fa-crosshairs text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-white">APEX-RADAR</h1>
                    <p class="text-[10px] text-slate-400 font-sans uppercase tracking-widest font-bold">Mendoza Vehicle Scraper & Control</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="status-badge" class="bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-md text-xs font-bold flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500" id="status-dot"></span>
                    </span>
                    <span id="status-text" class="text-slate-400">DISCONNECTED (LOCAL)</span>
                </div>
                <button id="btn-demo" class="bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 border border-amber-500/30 text-[11px] font-bold px-2.5 py-1.5 rounded-md transition-all cursor-pointer">
                    🧪 FORZAR MODO DEMO
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-5">
        
        <section class="lg:col-span-5 flex flex-col gap-5">
            
            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 shadow-md relative overflow-hidden before:absolute before:top-0 before:left-0 before:h-1 before:w-full before:bg-amber-500">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-square-plus text-amber-500"></i>
                    <h2 class="font-black text-sm uppercase tracking-wider text-slate-200">Registrar Agencia</h2>
                </div>
                
                <form id="form-agencia" class="space-y-3 font-sans" autocomplete="off">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Nombre Comercial</label>
                        <input type="text" id="age-nombre" placeholder="Ej: Automotores Tommy" autocomplete="new-password" spellcheck="false" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-amber-500 font-mono" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">WhatsApp (Formato: 2634912196)</label>
                        <input type="text" id="age-whatsapp" placeholder="Ej: 2634912196" autocomplete="one-time-code" spellcheck="false" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-amber-500 font-mono" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Región Comercial Asignada</label>
                        <select id="age-zona" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-amber-500 font-mono cursor-pointer">
                            <option value="este">Este (San Martín, Junín, Rivadavia...)</option>
                            <option value="gm_norte">Gran Mendoza Norte (Capital, Las Heras...)</option>
                            <option value="gm_sur">Gran Mendoza Sur (Godoy Cruz, Maipú, Luján...)</option>
                            <option value="valle_uco">Valle de Uco (Tunuyán, Tupungato...)</option>
                            <option value="sur">Sur (San Rafael, Alvear, Malargüe)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black text-xs uppercase py-2 px-4 rounded transition-all flex items-center justify-center gap-2 cursor-pointer shadow-md shadow-amber-950/20 font-mono">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar Configuración
                    </button>
                </form>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 shadow-md relative overflow-hidden before:absolute before:top-0 before:left-0 before:h-1 before:w-full before:bg-blue-500">
                <div class="flex items-center gap-2 mb-3">
                    <i class="fa-solid fa-sliders text-blue-500"></i>
                    <h2 class="font-black text-sm uppercase tracking-wider text-slate-200">Asignar Filtros Avanzados</h2>
                </div>
                
                <form id="form-interes" class="space-y-3 font-sans" autocomplete="off">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Agencia Objetivo</label>
                        <select id="int-agencia" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer" required>
                            <option value="">-- SELECCIONAR AGENCIA --</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-black text-amber-500 uppercase tracking-wider mb-1">💵 Precio Mínimo ($)</label>
                            <input type="number" id="int-precio-min" placeholder="Ej: 4500000" autocomplete="off" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-blue-500 font-mono">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-amber-500 uppercase tracking-wider mb-1">💵 Precio Máximo ($)</label>
                            <input type="number" id="int-precio-max" placeholder="Ej: 9000000" autocomplete="off" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-blue-500 font-mono">
                        </div>
                    </div>

                    <div class="border-t border-slate-900 my-1 opacity-50"></div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Tipo de Vehículo</label>
                        <select id="int-tipo" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer">
                            <option value="autos_utilitarios">Autos, Camionetas y Utilitarios</option>
                            <option value="motos">Motos</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Marca</label>
                            <select id="int-marca" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer">
                                <option value="">-- SELECCIONAR TIPO PRIMERO --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Modelo Seleccionado</label>
                            <select id="int-modelo" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed" disabled required>
                                <option value="">-- ELIGE MARCA primero --</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Kilometraje Máximo</label>
                            <select id="int-km" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer">
                                <option value="0">Sin Límite</option>
                                <option value="20000">Hasta 20.000 km</option>
                                <option value="50000">Hasta 50.000 km</option>
                                <option value="100000">Hasta 100.000 km</option>
                                <option value="150000">Hasta 150.000 km</option>
                                <option value="200000">Hasta 200.000 km</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Año Mínimo</label>
                            <select id="int-anio" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer">
                                <option value="0">Todos los años</option>
                                <option value="2026">2026</option>
                                <option value="2025">2025</option>
                                <option value="2024">2024</option>
                                <option value="2023">2023</option>
                                <option value="2022">2022</option>
                                <option value="2021">2021</option>
                                <option value="2020">2020</option>
                                <option value="2019">2019</option>
                                <option value="2018">2018</option>
                                <option value="2017">2017</option>
                                <option value="2016">2016</option>
                                <option value="2015">2015</option>
                                <option value="2014">2014</option>
                                <option value="2013">2013</option>
                                <option value="2012">2012</option>
                                <option value="2011">2011</option>
                                <option value="2010">2010</option>
                                <option value="2008">2008</option>
                                <option value="2005">2005</option>
                                <option value="2000">2000</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Combustible</label>
                            <select id="int-combustible" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer">
                                <option value="todos">Todos</option>
                                <option value="nafta">Solo Nafta</option>
                                <option value="diesel">Solo Diésel</option>
                                <option value="gnc">Con GNC</option>
                                <option value="hibrido">Híbrido / Eléctrico</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Condición Permuta</label>
                            <select id="int-permuta" class="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 font-mono cursor-pointer">
                                <option value="indiferente">Indiferente</option>
                                <option value="acepta">Debe aceptar permuta</option>
                                <option value="no_acepta">Solo efectivo</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-xs uppercase py-2 px-4 rounded transition-all flex items-center justify-center gap-2 cursor-pointer shadow-md shadow-blue-950/20 font-mono pt-3">
                        <i class="fa-solid fa-bolt"></i> Enlazar Filtro Configurado
                    </button>
                </form>
            </div>
        </section>

<section class="lg:col-span-7">
    <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 shadow-md min-h-[520px] flex flex-col">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-800 pb-3 mb-3 gap-2">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-server text-red-500"></i>
                <h2 class="font-black text-sm uppercase tracking-wider text-slate-200">Estructura Activa en Supabase</h2>
            </div>
            
            <div class="flex gap-2">
                <button id="btn-radar" onclick="activarRadarReal()" class="bg-green-600 hover:bg-green-700 text-white font-black text-[11px] px-3 py-1.5 rounded border border-green-700 transition-all cursor-pointer flex items-center gap-1.5 shadow-lg shadow-green-900/20">
                    <i class="fa-solid fa-crosshairs"></i> ACTIVAR RADAR
                </button>

                <button id="btn-re-scan" class="bg-slate-800 hover:bg-slate-700 text-[11px] text-slate-300 px-3 py-1.5 rounded border border-slate-700 transition-all cursor-pointer flex items-center gap-1.5">
                    <i class="fa-solid fa-rotate"></i> RE-ESCANEAR
                </button>
            </div>
        </div>

        <div id="contenedor-mapeo" class="space-y-3 flex-1">
            </div>

    </div>
</section>

    </main>

    <script src="../app.js"></script>

</body>
</html>
